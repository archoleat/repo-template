name: Spec

on:
  pull_request:
    branches:
      - main
    paths:
      - 'package.json'
      - 'src/**/*.ts'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'src/**/*.ts'

jobs:
  spec:
    name: Spec

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun i

      - name: Specs
        run: bun test
