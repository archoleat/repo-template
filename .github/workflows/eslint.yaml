name: ESLint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**/*.ts'
  push:
    branches:
      - main
    paths:
      - 'src/**/*.ts'

jobs:
  eslint:
    name: ESLint

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun i

      - name: Lint
        run: bun eslint 'src/**/*.ts'
